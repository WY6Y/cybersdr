version: '3.8'

services:
  cybersdr:
    build: .
    container_name: cybersdr
    restart: unless-stopped
    network_mode: host
    volumes:
      - sdr_data:/data
      - ./.env:/app/.env:ro
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    environment:
      - TZ=America/Chicago
    # network_mode: host lets the container reach rtl_tcp on any LAN/VPN host
    # configured via RTL_TCP_HOST in .env

volumes:
  sdr_data:
    driver: local
