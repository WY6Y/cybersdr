version: '3.8'

services:
  cybersdr:
    build: .
    container_name: cybersdr
    restart: unless-stopped
    network_mode: host
    volumes:
      - sdr_data:/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=America/Chicago
    # network_mode: host gives the container access to tailscale0 so it can
    # reach rtl_tcp on ECHOLINK-MACHINE (100.66.32.23:1234)

volumes:
  sdr_data:
    driver: local
